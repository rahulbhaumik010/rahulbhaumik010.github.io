<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>3D Research Constellation | Rahul Bhaumik</title>

  <!-- p5.js library -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #000000;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
    }

    .top-bar {
      position: fixed;
      top: 18px;
      left: 18px;
      right: 18px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      pointer-events: none;
    }

    .title-box {
      max-width: 560px;
      padding: 1rem 1.1rem;
      border-radius: 18px;
      color: #ffffff;
      background: rgba(5, 12, 24, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(12px);
      pointer-events: auto;
    }

    .title-box h1 {
      margin: 0 0 0.35rem 0;
      font-size: 1.15rem;
    }

    .title-box p {
      margin: 0;
      font-size: 0.88rem;
      line-height: 1.45;
      color: rgba(255, 255, 255, 0.75);
    }

    .back-button {
      pointer-events: auto;
      display: inline-block;
      padding: 0.75rem 1rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .back-button:hover {
      background: rgba(120, 190, 255, 0.25);
      border-color: rgba(120, 190, 255, 0.6);
    }

    .legend {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 10;
      padding: 0.85rem 1rem;
      border-radius: 16px;
      background: rgba(5, 12, 24, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.85rem;
      backdrop-filter: blur(12px);
    }

    .legend div {
      margin: 0.25rem 0;
    }

    .dot {
      display: inline-block;
      width: 0.7rem;
      height: 0.7rem;
      border-radius: 50%;
      margin-right: 0.45rem;
      vertical-align: middle;
    }

    .dot-center {
      background: #ffffff;
    }

    .dot-theme {
      background: #8fd3ff;
    }

    .dot-paper {
      background: #d7ecff;
    }

    #status {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 10;
      width: min(390px, calc(100vw - 36px));
      padding: 1rem;
      border-radius: 16px;
      background: rgba(5, 12, 24, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.85rem;
      line-height: 1.45;
      backdrop-filter: blur(12px);
    }

    @media (max-width: 720px) {
      .top-bar {
        flex-direction: column;
      }

      .title-box h1 {
        font-size: 1rem;
      }

      .title-box p {
        font-size: 0.78rem;
      }

      .legend {
        display: none;
      }

      #status {
        left: 18px;
        right: 18px;
        width: auto;
      }
    }
  </style>
</head>

<body>
  <div class="top-bar">
    <div class="title-box">
      <h1>3D Research Constellation</h1>
      <p>Drag to rotate, scroll to zoom, and explore the spatial map of research themes and publications.</p>
    </div>

    <a class="back-button" href="index.html#research">Back to main website</a>
  </div>

  <div class="legend">
    <div><span class="dot dot-center"></span>Me</div>
    <div><span class="dot dot-theme"></span>Research theme</div>
    <div><span class="dot dot-paper"></span>Publication</div>
  </div>

  <div id="status">Loading research constellation...</div>

  <script>
    let graphData;
    let nodes = [];
    let links = [];
    let nodeMap = {};
    let graphReady = false;

    function preload() {
      graphData = loadJSON(
        "data/researchGraph.json",
        function () {
          console.log("Research graph JSON loaded.");
        },
        function () {
          document.getElementById("status").innerHTML =
            "Could not load data/researchGraph.json. Check the file path and JSON validity.";
        }
      );
    }

    function setup() {
      createCanvas(windowWidth, windowHeight, WEBGL);
      textFont("Arial");
      textAlign(CENTER, CENTER);

      if (!graphData || !graphData.nodes || !graphData.links) {
        document.getElementById("status").innerHTML =
          "Graph data was not found or is invalid.";
        return;
      }

      buildGraphLayout();

      const publicationCount = nodes.filter(n => n.type === "paper").length;
      const themeCount = nodes.filter(n => n.type === "theme").length;

      document.getElementById("status").innerHTML =
        publicationCount +
        " publications · " +
        themeCount +
        " research themes<br>Drag to rotate. Scroll to zoom.";

      graphReady = true;
    }

    function draw() {
      background(0);

      drawBackgroundGlow();

      ambientLight(130);
      directionalLight(180, 220, 255, -0.4, -0.6, -1);
      pointLight(120, 190, 255, 0, 0, 500);

      orbitControl(1.2, 1.2, 0.15);

      if (!graphReady) return;

      drawStarField();
      drawLinks();
      drawNodes();
    }

    function buildGraphLayout() {
      nodes = graphData.nodes.map(n => Object.assign({}, n));
      links = graphData.links.map(l => Object.assign({}, l));

      nodeMap = {};

      nodes.forEach(n => {
        nodeMap[n.id] = n;
      });

      const centerNode = nodeMap["rahul-research"];

      if (centerNode) {
        centerNode.x = 0;
        centerNode.y = 0;
        centerNode.z = 0;
      }

      const themes = nodes.filter(n => n.type === "theme");
      const papers = nodes.filter(n => n.type === "paper");

      const themeRadius = 230;

      themes.forEach((theme, i) => {
        const theta = TWO_PI * i / themes.length;
        const phi = acos(1 - 2 * (i + 0.5) / themes.length);

        theme.x = themeRadius * sin(phi) * cos(theta);
        theme.y = themeRadius * sin(phi) * sin(theta);
        theme.z = themeRadius * cos(phi);
      });

      papers.forEach((paper, i) => {
        const connectedThemeIds = links
          .filter(l => l.source === paper.id || l.target === paper.id)
          .map(l => l.source === paper.id ? l.target : l.source)
          .filter(id => nodeMap[id] && nodeMap[id].type === "theme");

        let baseX = 0;
        let baseY = 0;
        let baseZ = 0;

        if (connectedThemeIds.length > 0) {
          connectedThemeIds.forEach(id => {
            baseX += nodeMap[id].x;
            baseY += nodeMap[id].y;
            baseZ += nodeMap[id].z;
          });

          baseX /= connectedThemeIds.length;
          baseY /= connectedThemeIds.length;
          baseZ /= connectedThemeIds.length;
        }

        const spread = 95;
        const theta = TWO_PI * i / papers.length;
        const vertical = map(i % 7, 0, 6, -80, 80);

        paper.x = baseX * 1.35 + cos(theta) * spread;
        paper.y = baseY * 1.35 + sin(theta) * spread;
        paper.z = baseZ * 1.35 + vertical;
      });
    }

    function drawBackgroundGlow() {
      push();
      noStroke();

      translate(0, 0, -650);

      fill(10, 25, 48, 110);
      sphere(420, 32, 24);

      fill(0, 0, 0, 180);
      sphere(700, 32, 24);

      pop();
    }

    function drawLinks() {
      strokeWeight(1);
      stroke(150, 205, 255, 95);

      links.forEach(link => {
        const source = nodeMap[link.source];
        const target = nodeMap[link.target];

        if (!source || !target) return;

        line(source.x, source.y, source.z, target.x, target.y, target.z);
      });
    }

    function drawNodes() {
      nodes.forEach(node => {
        push();
        translate(node.x, node.y, node.z);

        noStroke();

        if (node.type === "center") {
          fill(255);
          sphere(17, 24, 16);
        } else if (node.type === "theme") {
          fill(143, 211, 255);
          sphere(11, 20, 12);
        } else {
          fill(215, 236, 255);
          sphere(7, 16, 10);
        }

        pop();

        drawLabel(node);
      });
    }

    function drawLabel(node) {
      push();

      translate(node.x, node.y - 25, node.z);

      noStroke();

      if (node.type === "center") {
        fill(255);
        textSize(18);
      } else if (node.type === "theme") {
        fill(180, 225, 255);
        textSize(13);
      } else {
        fill(235, 246, 255);
        textSize(9);
      }

      const label = node.shortLabel || node.label;
      text(label, 0, 0);

      pop();
    }

    function drawStarField() {
      push();
      stroke(255, 55);
      strokeWeight(1);

      for (let i = 0; i < 120; i++) {
        const x = sin(i * 12.9898) * 950;
        const y = cos(i * 78.233) * 580;
        const z = sin(i * 37.719) * 950;
        point(x, y, z);
      }

      pop();
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }
  </script>
</body>
</html>
